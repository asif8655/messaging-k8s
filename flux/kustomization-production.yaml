apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: messaging-production
  namespace: flux-system
spec:
  interval: 10m
  path: ./production
  prune: true
  sourceRef:
    kind: GitRepository
    name: messaging-k8s
  targetNamespace: messaging-production
  decryption:
    provider: sops
    secretRef:
      name: sops-gpg
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: messaging-deployment
      namespace: messaging-production
