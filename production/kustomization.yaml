apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: messaging-production

resources:
  - ../base
  - messaging-secret.yaml

images:
  - name: ghcr.io/auruscent/messaging-backend
    newTag: v0.0.1-snapshot  # Update this manually for production deployments
  - name: ghcr.io/auruscent/messaging-frontend
    newTag: v0.0.1-snapshot  # Update this manually for production deployments

patches:
  # Set replicas to 2 for production HA
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
    target:
      kind: Deployment
      name: messaging-deployment

  # Set resource limits for production
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            memory: 2Gi
            cpu: 500m
          limits:
            memory: 4Gi
    target:
      kind: Deployment
      name: messaging-deployment

  # Set DB_HOST for production
  - patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: DB_HOST
          value: messaging-db-rw
    target:
      kind: Deployment
      name: messaging-deployment

  # Update heap size memory
  - patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: JAVA_TOOL_OPTIONS
          value: "-XX:MaxRAMPercentage=50.0"
    target:
      kind: Deployment
      name: messaging-deployment

  # Update database secret references
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/env/0/valueFrom/secretKeyRef/name
        value: messaging-db-app
      - op: replace
        path: /spec/template/spec/containers/0/env/1/valueFrom/secretKeyRef/name
        value: messaging-db-app
    target:
      kind: Deployment
      name: messaging-deployment

  # Database configuration for production (HA with backups)
  - patch: |-
      - op: replace
        path: "/spec/instances"
        value: 2
    target:
      group: postgresql.cnpg.io
      version: v1
      kind: Cluster
      name: messaging-db

  # Database resources for production
  - patch: |-
      - op: replace
        path: "/spec/storage/size"
        value: 20Gi
    target:
      kind: Cluster
      name: messaging-db

  # Production ingress host
  - patch: |-
      - op: replace
        path: /spec/tls/0/hosts/0
        value: messaging.yourdomain.com
      - op: replace
        path: /spec/tls/0/secretName
        value: messaging-tls-cert
      - op: replace
        path: /spec/rules/0/host
        value: messaging.yourdomain.com
    target:
      kind: Ingress
      name: messaging-ingress

# Override ConfigMap values for production
configMapGenerator:
  - name: messaging
    behavior: merge
    literals:
      - APP_CORS_ALLOWED_ORIGINS="https://messaging.yourdomain.com"
      - APP_BASE_URL="https://messaging.yourdomain.com"
      - WEBSOCKET_ALLOWED_ORIGINS="https://messaging.yourdomain.com"
