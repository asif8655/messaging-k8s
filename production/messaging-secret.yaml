apiVersion: v1
kind: Secret
metadata:
  name: messaging-secret
type: Opaque
stringData:
  # JWT Secret - REPLACE WITH ACTUAL SECRET
  APP_JWT_SECRET: "CHANGE_ME_PRODUCTION_SECRET_HERE"
  
  # Email Configuration - REPLACE WITH ACTUAL CREDENTIALS
  SPRING_MAIL_HOST: "smtp.gmail.com"
  SPRING_MAIL_PORT: "587"
  SPRING_MAIL_USERNAME: "production-email@example.com"
  SPRING_MAIL_PASSWORD: "production-app-password"
  
  # Database password (if not using CloudNativePG auto-generated)
  # DB_PASS: "production-db-password"

# NOTE: This file MUST be encrypted with SOPS before committing!
# Run: sops -e -i production/messaging-secret.yaml
