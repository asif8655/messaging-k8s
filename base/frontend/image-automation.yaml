apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageRepository
metadata:
  name: messaging-frontend
spec:
  image: ghcr.io/auruscent/messaging-frontend
  interval: 5m
  secretRef:
    name: messaging-reg-cred

---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: messaging-frontend
spec:
  imageRepositoryRef:
    name: messaging-frontend
  filterTags:
    pattern: "^.*-[a-fA-F0-9]+-(?P<ts>.*)"
    extract: "$ts"
  policy:
    numerical:
      order: asc
