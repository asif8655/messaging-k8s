name: Build and Push Frontend Image

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

env:
  IMAGE_NAME: messaging-frontend

jobs:
  quality:
    name: Lint and Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run production build
        run: npm run build

  build-and-push:
    name: Build and Push Frontend Image
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push'
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        run: az acr login --name "${{ vars.ACR_NAME }}"

      - name: Extract metadata
        id: meta
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          TIMESTAMP=$(date +%s)

          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            TAG_PREFIX="prod-"
          elif [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
            TAG_PREFIX="staging-"
          else
            TAG_PREFIX="dev-"
          fi

          FULL_TAG="${TAG_PREFIX}${SHORT_SHA}-${TIMESTAMP}"
          echo "full_tag=${FULL_TAG}" >> $GITHUB_OUTPUT
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "timestamp=${TIMESTAMP}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ vars.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.full_tag }}
            ${{ vars.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Trigger staging deploy in messaging-k8s
        if: github.ref == 'refs/heads/develop'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.K8S_REPO_PAT }}
          repository: ${{ vars.K8S_REPO }}
          event-type: deploy-staging
          client-payload: >-
            {"service":"frontend","environment":"staging","frontend_image_tag":"${{ steps.meta.outputs.full_tag }}"}