name: Update Staging Image Tags

on:
  repository_dispatch:
    types:
      - deploy-staging
  workflow_dispatch:
    inputs:
      service:
        description: Service to update
        required: true
        type: choice
        options:
          - backend
          - frontend
      backend_image_tag:
        description: Backend image tag (required when service=backend)
        required: false
        type: string
      frontend_image_tag:
        description: Frontend image tag (required when service=frontend)
        required: false
        type: string

permissions:
  contents: write

jobs:
  update-staging-tags:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve input payload
        id: payload
        shell: bash
        run: |
          SERVICE="${{ github.event.client_payload.service || inputs.service }}"
          BACKEND_TAG="${{ github.event.client_payload.backend_image_tag || inputs.backend_image_tag }}"
          FRONTEND_TAG="${{ github.event.client_payload.frontend_image_tag || inputs.frontend_image_tag }}"

          if [[ "$SERVICE" != "backend" && "$SERVICE" != "frontend" ]]; then
            echo "Service must be backend or frontend"
            exit 1
          fi

          if [[ "$SERVICE" == "backend" && -z "$BACKEND_TAG" ]]; then
            echo "backend_image_tag is required when service=backend"
            exit 1
          fi

          if [[ "$SERVICE" == "frontend" && -z "$FRONTEND_TAG" ]]; then
            echo "frontend_image_tag is required when service=frontend"
            exit 1
          fi

          echo "service=$SERVICE" >> "$GITHUB_OUTPUT"
          echo "backend_tag=$BACKEND_TAG" >> "$GITHUB_OUTPUT"
          echo "frontend_tag=$FRONTEND_TAG" >> "$GITHUB_OUTPUT"

      - name: Update staging kustomization
        shell: bash
        run: |
          FILE="staging/kustomization.yaml"

          if [[ "${{ steps.payload.outputs.service }}" == "backend" ]]; then
            TAG="${{ steps.payload.outputs.backend_tag }}"
            sed -i -E "/name: ghcr.io\\/auruscent\\/messaging-backend/{n; s/newTag: .*/newTag: ${TAG}/;}" "$FILE"
          fi

          if [[ "${{ steps.payload.outputs.service }}" == "frontend" ]]; then
            TAG="${{ steps.payload.outputs.frontend_tag }}"
            sed -i -E "/name: ghcr.io\\/auruscent\\/messaging-frontend/{n; s/newTag: .*/newTag: ${TAG}/;}" "$FILE"
          fi

      - name: Commit and push changes
        shell: bash
        run: |
          if git diff --quiet -- staging/kustomization.yaml; then
            echo "No changes in staging image tags"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add staging/kustomization.yaml
          git commit -m "ci: update staging image tag for ${{ steps.payload.outputs.service }}"
          git push
