name: Deploy to Azure AKS (Manual)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - acceptance
          - staging
          - production
      backend_image_tag:
        description: Backend image tag (required for first deployment)
        required: false
        type: string
      frontend_image_tag:
        description: Frontend image tag (required for first deployment)
        required: false
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set deployment variables
        id: vars
        shell: bash
        run: |
          ENVIRONMENT="${{ inputs.environment }}"
          BACKEND_TAG="${{ inputs.backend_image_tag }}"
          FRONTEND_TAG="${{ inputs.frontend_image_tag }}"

          case "$ENVIRONMENT" in
            acceptance) NAMESPACE="messaging-acceptance" ;;
            staging) NAMESPACE="messaging-staging" ;;
            production) NAMESPACE="messaging-production" ;;
            *) echo "Unsupported environment: $ENVIRONMENT"; exit 1 ;;
          esac

          echo "environment=$ENVIRONMENT" >> "$GITHUB_OUTPUT"
          echo "namespace=$NAMESPACE" >> "$GITHUB_OUTPUT"
          echo "backend_tag=$BACKEND_TAG" >> "$GITHUB_OUTPUT"
          echo "frontend_tag=$FRONTEND_TAG" >> "$GITHUB_OUTPUT"

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set AKS context
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ vars.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ vars.AKS_CLUSTER_NAME }}

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Resolve missing image tags from current cluster state
        id: current
        shell: bash
        run: |
          set +e

          BACKEND_TAG="${{ steps.vars.outputs.backend_tag }}"
          FRONTEND_TAG="${{ steps.vars.outputs.frontend_tag }}"
          NS="${{ steps.vars.outputs.namespace }}"

          if [[ -z "$BACKEND_TAG" ]]; then
            CURRENT_BACKEND=$(kubectl -n "$NS" get deployment messaging-deployment -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null)
            BACKEND_TAG="${CURRENT_BACKEND##*:}"
          fi

          if [[ -z "$FRONTEND_TAG" ]]; then
            CURRENT_FRONTEND=$(kubectl -n "$NS" get deployment messaging-frontend -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null)
            FRONTEND_TAG="${CURRENT_FRONTEND##*:}"
          fi

          if [[ -z "$BACKEND_TAG" || -z "$FRONTEND_TAG" ]]; then
            echo "Both image tags are required for the first deployment."
            exit 1
          fi

          echo "backend_tag=$BACKEND_TAG" >> "$GITHUB_OUTPUT"
          echo "frontend_tag=$FRONTEND_TAG" >> "$GITHUB_OUTPUT"

      - name: Ensure namespace exists
        run: |
          kubectl create namespace "${{ steps.vars.outputs.namespace }}" --dry-run=client -o yaml | kubectl apply -f -

      - name: Render and deploy overlay
        shell: bash
        run: |
          WORKDIR=$(mktemp -d)
          cp -R . "$WORKDIR/repo"
          cd "$WORKDIR/repo/${{ steps.vars.outputs.environment }}"

          kustomize edit set image \
            ghcr.io/auruscent/messaging-backend=${{ env.ACR_LOGIN_SERVER }}/messaging-backend:${{ steps.current.outputs.backend_tag }}

          kustomize edit set image \
            ghcr.io/auruscent/messaging-frontend=${{ env.ACR_LOGIN_SERVER }}/messaging-frontend:${{ steps.current.outputs.frontend_tag }}

          kubectl apply -k .

      - name: Wait for rollouts
        run: |
          kubectl rollout status deployment/messaging-deployment -n "${{ steps.vars.outputs.namespace }}" --timeout=300s
          kubectl rollout status deployment/messaging-frontend -n "${{ steps.vars.outputs.namespace }}" --timeout=300s